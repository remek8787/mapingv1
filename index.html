<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mapping FTTH V1</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <h1>Mapping FTTH V1</h1>
      <p class="subtitle">SERVER → MIKROTIK → ODC → ODP/Splitter → CLIENT</p>

      <section class="card">
        <h2>Google Maps</h2>
        <label>Google Maps API Key</label>
        <div class="row">
          <input id="apiKeyInput" type="password" placeholder="Masukkan API key" />
          <button id="saveApiKeyBtn">Simpan</button>
        </div>
        <small>Kunci disimpan di browser (localStorage), bukan di repo.</small>
      </section>

      <section class="card">
        <h2>Tambah Node</h2>
        <label>Tipe</label>
        <select id="nodeType">
          <option>SERVER</option>
          <option>MIKROTIK</option>
          <option>ODC</option>
          <option>ODP</option>
          <option>SPLITTER</option>
          <option>CLIENT</option>
        </select>

        <label>Nama</label>
        <input id="nodeName" placeholder="Contoh: ODP 1" />

        <label>Parent (opsional)</label>
        <select id="parentNode">
          <option value="">-- tanpa parent --</option>
        </select>

        <label>Secret PPPoE (khusus CLIENT)</label>
        <input id="nodeSecret" placeholder="contoh: client-a" />

        <label>Splitter Ratio (opsional, contoh 1:8)</label>
        <input id="splitterRatio" placeholder="1:8" />

        <label>Latitude</label>
        <input id="latInput" type="number" step="any" />

        <label>Longitude</label>
        <input id="lngInput" type="number" step="any" />

        <small>Klik map untuk isi koordinat otomatis.</small>
        <button id="addNodeBtn" class="primary">Tambah Node</button>
      </section>

      <section class="card">
        <h2>Cari Secret Mikrotik</h2>
        <div class="row">
          <input id="secretSearch" placeholder="Masukkan secret/username" />
          <button id="searchBtn">Cari</button>
        </div>
        <div id="searchResult" class="result muted">Belum ada pencarian.</div>
      </section>

      <section class="card">
        <h2>Data</h2>
        <div class="row">
          <button id="exportBtn">Export JSON</button>
          <label class="file-btn">
            Import JSON
            <input id="importInput" type="file" accept="application/json" hidden />
          </label>
        </div>
        <button id="sampleBtn">Muat Sample Topologi</button>
      </section>

      <section class="card">
        <h2>Node List</h2>
        <div id="nodeList" class="node-list"></div>
      </section>
    </aside>

    <main class="map-wrap">
      <div id="map"></div>
    </main>
  </div>

  <script src="app.js"></script>
</body>
</html>
